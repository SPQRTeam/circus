[workspace]
channels = [
  "https://prefix.dev/pixi-build-backends",
  "https://prefix.dev/conda-forge",
]
platforms = ["osx-arm64", "linux-64"]
preview = ["pixi-build"]

[dependencies]
circus = { path = "." }
python = "3.12.*"

[package]
name = "circus"
version = "0.1.0"

[package.build]
backend = { name = "pixi-build-cmake", version = "==0.3.5" }

[package.build-dependencies]
cmake = ">=3.27,<4"

[package.host-dependencies]
python = "3.12.*"
nanobind = "2.8.*"
eigen = "==3.4.0"
yaml-cpp = "==0.8.0"
nlohmann_json = "==3.12.0"
pugixml = "==1.15"
libcurl = "==8.14.1"
qt6-main = "==6.9.2"
qt6-charts = "==6.9.2"
libmujoco = "==3.3.3"
msgpack-cxx = "==7.0.0"
libboost-devel = "==1.88.0"

[package.target.linux-64.host-dependencies]
libgl-devel = "==1.7.0"
libegl-devel = "==1.7.0"

[package.target.osx-arm64.host-dependencies]

[tasks]
test = "python -c 'import circuspy; circuspy.test()'"

[activation]
# Add DYLD_LIBRARY_PATH on macOS so the MuJoCo dylib is found when running binaries directly
env = { DYLD_LIBRARY_PATH = "$DYLD_LIBRARY_PATH:$CONDA_PREFIX/lib", PATH = "$CONDA_PREFIX/bin:$PATH"}

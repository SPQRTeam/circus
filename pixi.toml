[workspace]
channels = [
  "https://prefix.dev/conda-forge",
]
platforms = ["osx-arm64", "linux-64"]

[dependencies]
python = "3.12.*"
nanobind = "2.8.*"
eigen = "==3.4.0"
yaml-cpp = "==0.8.0"
nlohmann_json = "==3.12.0"
pugixml = "==1.15"
libcurl = "==8.14.1"
qt6-main = "==6.9.2"
qt6-charts = "==6.9.2"
libmujoco = "==3.3.3"
msgpack-cxx = "==7.0.0"
libboost-devel = "==1.88.0"
cmake = ">=3.27,<4"

[target.linux-64.dependencies]
libgl-devel = "==1.7.0"
libegl-devel = "==1.7.0"

[tasks]
configure = { cmd = "cmake -S $PIXI_PROJECT_ROOT -B $PIXI_PROJECT_ROOT/build -DCMAKE_PREFIX_PATH=$PIXI_PROJECT_ROOT/.pixi/envs/default -DCMAKE_INSTALL_PREFIX=$PIXI_PROJECT_ROOT/.pixi/envs/default" }
compile = { cmd = "sh -c 'cmake --build $PIXI_PROJECT_ROOT/build -j${JOBS:-4}'", depends-on = ["configure"] }
install = { cmd = "cmake --install $PIXI_PROJECT_ROOT/build", depends-on = ["compile"] }
clear = { cmd = "rm -rf $PIXI_PROJECT_ROOT/build" }
test = { cmd = "python -c 'import circuspy; circuspy.test()'", depends-on = ["install"] }
circus = { cmd = "$PIXI_PROJECT_ROOT/build/circus", depends-on = ["compile"] }

[activation]
env = {DYLD_LIBRARY_PATH = "$DYLD_LIBRARY_PATH:$CONDA_PREFIX/lib", LD_LIBRARY_PATH = "$LD_LIBRARY_PATH:$CONDA_PREFIX/lib", PATH = "$CONDA_PREFIX/bin:$PATH"}